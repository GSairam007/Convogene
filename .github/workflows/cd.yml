name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/arm64, linux/amd64
          tags: sairam76/amd-frontend-code:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/arm64, linux/amd64
          tags: sairam76/amd_backend_private:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Step 3: SSH into VM, pull images & deploy
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << ENDSSH
            cd /home/ubuntu/Convogene

            echo "Pulling latest code..."
            git pull origin main

            echo "Logging into DockerHub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Pulling latest images from DockerHub..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/amd-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/amd-frontend:latest

            echo "Restarting containers..."
            docker-compose down
            docker-compose up -d

            echo "Cleaning up..."
            docker system prune -f

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/id_rsa