name: CD - Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Full Setup & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Run remote setup & deploy
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'

            set -e  # stop on error

            APP_DIR="$HOME/app"
            REPO_URL="https://github.com/GSairam007/Convogene"

            echo "📦 Updating system..."
            sudo apt update -y

            echo "🐳 Installing Docker if not present..."
            if ! command -v docker &> /dev/null
            then
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            echo "📦 Installing Docker Compose if not present..."
            if ! command -v docker-compose &> /dev/null
            then
              sudo apt install -y docker-compose
            fi

            echo "📁 Creating app directory..."
            mkdir -p $APP_DIR
            cd $APP_DIR

            echo "📥 Cloning repo if not exists..."
            if [ ! -d ".git" ]; then
              git clone $REPO_URL .
            fi

            echo "🔄 Pulling latest code..."
            git pull origin main

            echo "🛑 Stopping old containers..."
            docker-compose down || true

            echo "🚀 Starting containers..."
            docker-compose up --build -d

            echo "🧹 Cleaning up..."
            docker system prune -f

            echo "✅ Deployment complete!"

          EOF