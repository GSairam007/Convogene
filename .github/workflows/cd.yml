name: CI/CD - Build, Push to DockerHub & Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  # Step 1: Build and Push images to DockerHub
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Needed for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Buildx is required for multi-arch + cache support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./amd_backend_rag
          push: true
          platforms: linux/amd64,linux/arm64
          tags: sairam76/amd-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./amd-frontend-code
          push: true
          platforms: linux/amd64,linux/arm64
          tags: sairam76/amd-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Step 2: Manual Approval Gate
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production

    steps:
      - name: Approved
        run: echo "Deployment approved. Proceeding..."

  # ─────────────────────────────────────────
  # Step 3: SSH into VM, pull images & deploy
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << ENDSSH
            cd /home/ubuntu/Convogene

            echo "Pulling latest code..."
            git pull origin main

            echo "Logging into DockerHub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Pulling latest images from DockerHub..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/amd-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/amd-frontend:latest

            echo "Restarting containers..."
            docker-compose down
            docker-compose up -d

            echo "Cleaning up..."
            docker system prune -f

            echo "✅ Deployment complete!"
          ENDSSH

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/id_rsa