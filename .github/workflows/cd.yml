name: CI/CD - Build, Push to DockerHub & Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────
  # Step 1: Build and Push images to DockerHub
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./amd_backend_rag
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/amd-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./amd-frontend-code
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/amd-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  # ──────────────────────────────────────────
  # Step 3: SSH into VM, pull images & deploy
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ranga/Convogene-On-prem-Deployment"

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e

            cd /home/ranga/Convogene-On-prem-Deployment

            echo "Logging into DockerHub..."
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "Pulling latest images..."
            docker pull $DOCKER_USERNAME/amd-backend:latest
            docker pull $DOCKER_USERNAME/amd-frontend:latest

            echo "Restarting containers..."
            docker compose down
            docker compose up -d

            echo "Cleaning up unused images..."
            docker image prune -f

            echo "✅ Deployment complete!"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}